<main class="shell">
  <h1>Katana Gen 3 Patch Manager</h1>
  <p>Smoke test real amp communication from the web UI.</p>
  <div class="actions">
    <button type="button" (click)="testAmpConnection()" [disabled]="isLoading()">
      {{ isLoading() ? 'Working...' : 'Test Amp Connection' }}
    </button>
    <button type="button" (click)="readCurrentPatch()" [disabled]="isLoading()">
      {{ isLoading() ? 'Working...' : 'Read Current Patch' }}
    </button>
  </div>
  <p class="status">{{ status() }}</p>
  <pre>{{ responseJson() }}</pre>
</main>
