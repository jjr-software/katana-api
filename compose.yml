services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: katana
      POSTGRES_USER: katana
      POSTGRES_PASSWORD: katana
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U katana -d katana"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app_internal

  api:
    build:
      context: ./apps/api
    user: "1000:1000"
    group_add:
      - "29"
    device_cgroup_rules:
      - "c 116:* rmw"
    security_opt:
      - systempaths=unconfined
    environment:
      DATABASE_URL: postgresql+psycopg://katana:katana@db:5432/katana
      PIPEWIRE_SOCKET: /run/user/1000/pipewire-0
      MIDI_DEVICE_DIR: /dev/snd
      KATANA_MIDI_PORT: ${KATANA_MIDI_PORT:?Set KATANA_MIDI_PORT via scripts/resolve_katana_midi.py}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      XDG_RUNTIME_DIR: /run/user/1000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /run/user/1000/pipewire-0:/run/user/1000/pipewire-0
      - /dev/snd:/dev/snd
    labels:
      - com.dockerips.access.traefik-traefik-1=1
      - traefik.enable=true
      - traefik.http.routers.katana-api.rule=Host(`katana.ryzen.jjrsoftware.co.uk`) && PathPrefix(`/api`)
      - traefik.http.routers.katana-api.entrypoints=websecure
      - traefik.http.routers.katana-api.tls=true
      - traefik.http.routers.katana-api.tls.certresolver=le-dns
      - traefik.http.services.katana-api.loadbalancer.server.port=8000
    networks:
      - app_internal
      - dockerips

  web:
    build:
      context: ./apps/web
    user: "1000:1000"
    labels:
      - com.dockerips.access.traefik-traefik-1=1
      - traefik.enable=true
      - traefik.http.routers.katana-web.rule=Host(`katana.ryzen.jjrsoftware.co.uk`)
      - traefik.http.routers.katana-web.entrypoints=websecure
      - traefik.http.routers.katana-web.tls=true
      - traefik.http.routers.katana-web.tls.certresolver=le-dns
      - traefik.http.routers.katana-web.priority=1
      - traefik.http.services.katana-web.loadbalancer.server.port=80
    networks:
      - dockerips

volumes:
  db_data:

networks:
  app_internal:
    driver: bridge
  dockerips:
    external: true
